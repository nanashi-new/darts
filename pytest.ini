[pytest]
addopts = -m "not slow and not fuzz and not legacy"
norecursedirs =
    .git
    .local
    .tmp
    .venv
    .pytest_cache
    .mypy_cache
    .ruff_cache
    build
    dist
    release
    test_run
    pytest-cache-files-*
markers =
    unit: Fast unit tests for pure business logic.
    integration: Integration tests across services, DB, and filesystem.
    release_smoke: Minimal end-to-end smoke tests for release validation.
    slow: Optional long-running checks excluded from the default local gate.
    fuzz: Optional randomized robustness checks excluded from the default local gate.
    legacy: Optional compatibility checks excluded from the default local gate.
