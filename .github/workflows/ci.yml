name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Run mypy (fail-fast)
        run: python -m mypy app

      - name: Run pytest (fail-fast)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs

  smoke-export:
    name: Smoke export (PNG/PDF/XLSX)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Run release smoke export tests (PNG/PDF/XLSX)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs tests/test_release_smoke_max.py

  smoke-windows:
    name: Smoke Windows (clean profile)
    runs-on: windows-latest
    needs: checks
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (Windows)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Initialize clean Windows profile directories
        shell: pwsh
        run: |
          $cleanProfileRoot = Join-Path $env:RUNNER_TEMP "darts-clean-profile"
          if (Test-Path $cleanProfileRoot) {
            Remove-Item -Path $cleanProfileRoot -Recurse -Force
          }

          New-Item -Path $cleanProfileRoot -ItemType Directory -Force | Out-Null
          New-Item -Path (Join-Path $cleanProfileRoot "AppData\Roaming") -ItemType Directory -Force | Out-Null
          New-Item -Path (Join-Path $cleanProfileRoot "AppData\Local") -ItemType Directory -Force | Out-Null

          $legacyDartsDir = Join-Path $env:APPDATA "Darts"
          if (Test-Path $legacyDartsDir) {
            Remove-Item -Path $legacyDartsDir -Recurse -Force
          }

          "DARTS_CLEAN_PROFILE_ROOT=$cleanProfileRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "USERPROFILE=$cleanProfileRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPDATA=$(Join-Path $cleanProfileRoot 'AppData\Roaming')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LOCALAPPDATA=$(Join-Path $cleanProfileRoot 'AppData\Local')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run release smoke export tests on Windows
        shell: pwsh
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs tests/test_release_smoke_max.py
