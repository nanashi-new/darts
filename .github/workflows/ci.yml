name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Check installed dependency integrity
        run: python -m pip check

      - name: Validate pinned dependencies for release branches
        if: startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/heads/release/')
        run: |
          python - <<'PYTHON'
          from pathlib import Path

          invalid = []
          for line in Path('requirements-pinned.txt').read_text(encoding='utf-8').splitlines():
            entry = line.strip()
            if not entry or entry.startswith('#'):
              continue
            if '==' not in entry:
              invalid.append(entry)

          if invalid:
            raise SystemExit(
              'requirements-pinned.txt contains non-pinned dependencies for release branch: '
              + ', '.join(invalid)
            )
          print('All release dependencies in requirements-pinned.txt are pinned with ==')
          PYTHON

      - name: Run mypy (fail-fast)
        run: python -m mypy app

      - name: Run pytest (fail-fast)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs


  release-manual-report:
    name: Validate release manual run report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'release' || startsWith(github.base_ref, 'release/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate manual run report for release PR
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/ci/validate_release_report_for_pr.py

  smoke-export:
    name: Smoke export (PNG/PDF/XLSX)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Check installed dependency integrity
        run: python -m pip check

      - name: Validate pinned dependencies for release branches
        if: startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/heads/release/')
        run: |
          python - <<'PYTHON'
          from pathlib import Path

          invalid = []
          for line in Path('requirements-pinned.txt').read_text(encoding='utf-8').splitlines():
            entry = line.strip()
            if not entry or entry.startswith('#'):
              continue
            if '==' not in entry:
              invalid.append(entry)

          if invalid:
            raise SystemExit(
              'requirements-pinned.txt contains non-pinned dependencies for release branch: '
              + ', '.join(invalid)
            )
          print('All release dependencies in requirements-pinned.txt are pinned with ==')
          PYTHON

      - name: Run release smoke tests (including UI and export)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
          QT_QPA_PLATFORM: "offscreen"
        run: pytest -q -rs -m release_smoke

  smoke-windows:
    name: Smoke Windows (clean profile)
    runs-on: windows-latest
    needs: checks
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (Windows)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Check installed dependency integrity (Windows)
        shell: pwsh
        run: python -m pip check

      - name: Validate pinned dependencies for release branches (Windows)
        if: startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/heads/release/')
        shell: pwsh
        run: |
          python - <<'PYTHON'
          from pathlib import Path

          invalid = []
          for line in Path('requirements-pinned.txt').read_text(encoding='utf-8').splitlines():
            entry = line.strip()
            if not entry or entry.startswith('#'):
              continue
            if '==' not in entry:
              invalid.append(entry)

          if invalid:
            raise SystemExit(
              'requirements-pinned.txt contains non-pinned dependencies for release branch: '
              + ', '.join(invalid)
            )
          print('All release dependencies in requirements-pinned.txt are pinned with ==')
          PYTHON

      - name: Initialize clean Windows profile directories
        shell: pwsh
        run: |
          $cleanProfileRoot = Join-Path $env:RUNNER_TEMP "darts-clean-profile"
          if (Test-Path $cleanProfileRoot) {
            Remove-Item -Path $cleanProfileRoot -Recurse -Force
          }

          New-Item -Path $cleanProfileRoot -ItemType Directory -Force | Out-Null
          New-Item -Path (Join-Path $cleanProfileRoot "AppData\Roaming") -ItemType Directory -Force | Out-Null
          New-Item -Path (Join-Path $cleanProfileRoot "AppData\Local") -ItemType Directory -Force | Out-Null

          $legacyDartsDir = Join-Path $env:APPDATA "Darts"
          if (Test-Path $legacyDartsDir) {
            Remove-Item -Path $legacyDartsDir -Recurse -Force
          }

          "DARTS_CLEAN_PROFILE_ROOT=$cleanProfileRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "USERPROFILE=$cleanProfileRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPDATA=$(Join-Path $cleanProfileRoot 'AppData\Roaming')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LOCALAPPDATA=$(Join-Path $cleanProfileRoot 'AppData\Local')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run release smoke export tests on Windows
        shell: pwsh
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs tests/test_release_smoke_max.py
