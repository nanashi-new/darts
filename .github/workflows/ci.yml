name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Run mypy (fail-fast)
        run: python -m mypy app

      - name: Run pytest (fail-fast)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs

  smoke-export:
    name: Smoke export (PNG/PDF/XLSX)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux test dependencies
        run: bash scripts/ci/install_test_deps.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest

      - name: Run release smoke export tests (PNG/PDF/XLSX)
        env:
          CI: "true"
          DARTS_FORCE_FALLBACK_PDF: "1"
        run: pytest -q -rs tests/test_release_smoke_max.py
